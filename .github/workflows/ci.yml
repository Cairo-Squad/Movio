name: Android CI with Coverage Gate

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Verify compilation
        run: ./gradlew assemble --stacktrace

      - name: Run tests + generate merged coverage
        run: ./gradlew jacocoMergedReport --stacktrace

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - name: Check coverage threshold
        run: |
          report="build/reports/jacoco/merged/jacocoTestReport.xml"
          if [ ! -f "$report" ]; then
            echo "Error: merged coverage report not found!"
            exit 1
          fi
          covered=$(xmllint --xpath 'string(//counter[@type="LINE"]/@covered)' "$report")
          missed=$(xmllint --xpath 'string(//counter[@type="LINE"]/@missed)' "$report")
          total=$((covered + missed))
          percent=$((100 * covered / total))
          echo "Total line coverage: $percent%"
          if [ $percent -lt 80 ]; then
            echo "❌ Test coverage ($percent%) is below required 80%"
            exit 1
          fi
          echo "✅ Test coverage ($percent%) meets threshold"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/**/*.xml
            **/build/reports/jacoco/**/html
