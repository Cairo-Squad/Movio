name: Ci For Build and Coverage Check

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('/.gradle', '/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant Permission to Gradle
        run: chmod +x ./gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          mkdir -p app/
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > app/google-services.json
        shell: bash

      - name: Setup Project Files
        env:
          KEYSTORE: ${{ secrets.KEYSTORE }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          MOVIES_API_KEY: ${{ secrets.MOVIES_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_AUTH_TOKEN: ${{ secrets.FIREBASE_AUTH_TOKEN }}
        run: |
          # Cleanup existing files
          rm -f app/movio-cairo.jks secret.properties release_notes.txt

          # Decode keystore and verify
          echo "$KEYSTORE" | base64 -d > app/movio-cairo.jks

          # Create secret.properties with necessary properties
          echo "BASE_URL = \"https://api.themoviedb.org/3/\"" >> secret.properties
          echo "KEYSTORE_FILE = movio-cairo.jks" >> secret.properties
          echo "KEYSTORE_PASSWORD = $KEYSTORE_PASSWORD" >> secret.properties
          echo "KEY_ALIAS = $KEY_ALIAS" >> secret.properties
          echo "KEY_PASSWORD = $KEY_PASSWORD" >> secret.properties
          echo "API_KEY = \"$MOVIES_API_KEY\"" >> secret.properties

      - name: Build, Test & Generate Coverage Report
        run: |
          # Run all tasks in parallel where possible
          ./gradlew assembleRelease test koverHtmlReport --build-cache --parallel --daemon

      - name: Enforce 80% Coverage
        run: ./gradlew koverVerify --build-cache

      - name: Upload Test Results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '/build/test-results//*.xml'

      - name: Upload HTML Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-html-report
          path: build/reports/kover/html/

  test:

  comment-on-pr:
    name: Test Results
    needs: build-and-test
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}

    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results

      - name: Publish Results as PR Comment
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results//*.xml

  confirm-coverage:
    name: Confirm Coverage Upload
    needs: build-and-test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download HTML Report
        uses: actions/download-artifact@v4
        with:
          name: kover-html-report
          path: build/reports/kover/html/

      - name: Confirm Coverage Artifact
        run: echo "Kover HTML report is uploaded successfully."