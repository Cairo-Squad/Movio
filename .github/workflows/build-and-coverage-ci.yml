name: Ci For Build and Coverage Check

on:
  pull_request:
    types: [ opened, edited, synchronize, reopened ]
    branches: [ develop ]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            gradle-cache-pr-
      - name: Cache Build Outputs
        uses: actions/cache@v4
        with:
          path: |
            **/build/
          key: build-cache-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            build-cache-pr-
      - name: Grant Permission to Gradle
        run: chmod +x ./gradlew

      - name: Build Project
        run: ./gradlew build -x koverVerify -x test

  test:

    name: Verify Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cache-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            gradle-cache-pr-

      - name: Cache Build Outputs
        uses: actions/cache@v4
        with:
          path: |
            **/build/
          key: build-cache-pr-${{ github.event.pull_request.number }}
          restore-keys: |
            build-cache-pr-

      - name: Grant Permission to Gradle
        run: chmod +x ./gradlew

      - name: Run Tests + Generate Kover Report
        run: ./gradlew test koverHtmlReport

      - name: Enforce 80% Coverage
        run: ./gradlew koverVerify

      - name: Upload Test Results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/test/TEST-*.xml'

      - name: Upload HTML Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-html-report
          path: build/reports/kover/html/

  comment-on-pr:
    name: Comment on PR with Test Results
    needs: test
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name == 'pull_request' }}

    steps:
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: test-results

      - name: Publish Results as PR Comment
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/TEST-*.xml

  confirm-coverage:
    name: Confirm Coverage Upload
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download HTML Report
        uses: actions/download-artifact@v4
        with:
          name: kover-html-report
          path: build/reports/kover/html/

      - name: Confirm Coverage Artifact
        run: echo "Kover HTML report is uploaded successfully."
