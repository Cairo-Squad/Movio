lifecycleRuntimeKtx = "2.8.0"
constraintlayoutCompose = "1.1.1"
datastorePreferences = "1.1.7"
roomRuntime = "2.7.1"
roomTesting = "2.7.2"
navigation = "2.8.0"
composeBom = "2024.09.00"
paging_version = "3.3.6"
runtime = "1.8.3"
foundation = "1.8.3"
uiTestJunit4 = "1.8.3"
accompanistWebview = "0.36.0"

# Firebase
firebaseBom = "33.16.0"
firebaseAnalytics = "22.5.0"
firebaseCrashlytics = "19.4.4"
googleFirebasePerf = "1.4.2"
googleFirebaseCrashlytics = "3.0.4"
googleFirebaseAppdistribution = "5.1.1"
googleGmsGoogleServices = "4.4.3"

# Network
okhttp = "5.0.0"
retrofit = "3.0.0"
loggingInterceptor = "5.0.0"
mockwebserver = "5.1.0"
converterKotlinxSerialization = "3.0.0"

# Kotlin
kotlinxCoroutinesCore = "1.10.2"
kotlinxCoroutinesTest = "1.7.3"

# Serialization
serialization = "1.9.0"

# Dependency Injection
koin = "4.0.3"
